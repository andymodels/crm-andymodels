# Backup semanal da base PostgreSQL do CRM → Backblaze B2
#
# Requer secrets no repositório (Settings → Secrets and variables → Actions):
#   DATABASE_URL          — URL externa do Postgres (Render: instância Postgres → Connections → External)
#   B2_S3_ENDPOINT, B2_KEY_ID, B2_APPLICATION_KEY, B2_BUCKET
#   B2_PUBLIC_BASE_URL    — obrigatório para o módulo storage (mesmo valor que no Render)
# Opcional: B2_REGION (predef. us-west-000), BACKUP_B2_PREFIX, BACKUP_RETENTION_KEEP
#
# Não registe segredos em logs. O script nunca imprime DATABASE_URL nem chaves B2.

name: Backup base de dados (semanal)

on:
  schedule:
    # Segunda-feira 06:00 UTC (ajuste se preferir outro dia/hora)
    - cron: '0 6 * * 1'
  workflow_dispatch:

concurrency:
  group: backup-database-b2
  cancel-in-progress: false

jobs:
  backup:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Instalar cliente PostgreSQL (pg_dump)
        run: |
          sudo apt-get update -y
          sudo apt-get install -y postgresql-client

      - name: Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: npm ci (backend, sem postinstall)
        working-directory: backend
        run: npm ci --ignore-scripts

      - name: Executar backup → B2
        working-directory: backend
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          STORAGE_DRIVER: b2
          B2_S3_ENDPOINT: ${{ secrets.B2_S3_ENDPOINT }}
          B2_KEY_ID: ${{ secrets.B2_KEY_ID }}
          B2_APPLICATION_KEY: ${{ secrets.B2_APPLICATION_KEY }}
          B2_BUCKET: ${{ secrets.B2_BUCKET }}
          B2_PUBLIC_BASE_URL: ${{ secrets.B2_PUBLIC_BASE_URL }}
          NODE_ENV: production
        run: node scripts/backupDatabaseToB2.js
