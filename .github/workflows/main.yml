name: CRM Backup PostgreSQL -> B2

on:
  schedule:
    - cron: '0 6 * * 1'
  workflow_dispatch:

concurrency:
  group: crm-backup-postgres-b2
  cancel-in-progress: false

jobs:
  backup:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install backend dependencies (without postinstall)
        working-directory: backend
        run: npm ci --ignore-scripts

      - name: Validate Docker and pg_dump 18 image
        run: |
          docker --version
          docker pull postgres:18
          docker run --rm postgres:18 pg_dump --version

      - name: Run backup script
        working-directory: backend
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          B2_S3_ENDPOINT: ${{ secrets.B2_S3_ENDPOINT }}
          B2_KEY_ID: ${{ secrets.B2_KEY_ID }}
          B2_APPLICATION_KEY: ${{ secrets.B2_APPLICATION_KEY }}
          B2_BUCKET: ${{ secrets.B2_BUCKET }}
          BACKUP_B2_PREFIX: backups/database/
          BACKUP_RETENTION_KEEP: 12
          PG_DUMP_DOCKER_IMAGE: postgres:18
          NODE_ENV: production
        run: node scripts/backupDatabaseToB2.js
