# Blueprint Render — Andy Models CRM
# Doc: https://docs.render.com/blueprint-spec
#
# Novo ambiente: Dashboard → Blueprint → Connect repository → este ficheiro.
# Já tens serviço na Render? Não sincronizes tudo de uma vez: pode duplicar recursos.
# Nesse caso usa só como referência ou ajusta nomes (name) para não colidir.

services:
  - type: web
    name: andy-models-crm
    runtime: node
    region: frankfurt
    plan: free
    rootDir: backend
    buildCommand: npm install && npm run install:chrome && npm run build
    startCommand: npm run start:render
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: andy-models-db
          property: connectionString
      - key: RENDER
        value: "true"
      # URL pública do SPA (redirect /crm, contratos, etc.)
      - key: PUBLIC_APP_URL
        value: "https://crm-andymodels.onrender.com"
      # Links de cadastro público modelo/cliente (independente de PUBLIC_APP_URL)
      - key: CADASTRO_PUBLIC_URL
        value: "https://crm-andymodels.onrender.com"
      # Cache do Chromium no disco do serviço (não use /opt/render/.cache/puppeteer no painel).
      - key: PUPPETEER_CACHE_DIR
        value: "/opt/render/project/src/backend/.cache/puppeteer"
      # Opcional: horas de validade de cada link (predefinição no código: 72)
      - key: CADASTRO_LINK_HORAS_VALIDADE
        value: "72"
      - key: JWT_SECRET
        generateValue: true
      # Credenciais iniciais (usadas apenas se tabela usuarios estiver vazia)
      - key: ADMIN_EMAIL
        value: "admin@andymodels.com"
      - key: ADMIN_PASSWORD
        generateValue: true
      # Temporário para destravar login: ao iniciar, sincroniza senha do ADMIN_EMAIL com ADMIN_PASSWORD.
      # Depois que entrar, volte para "false" por segurança.
      - key: ADMIN_RESET_ON_START
        value: "false"
      # Fotos/OS em Backblaze B2: no Dashboard Render → Environment → adicionar (não commitar segredos):
      # STORAGE_DRIVER=b2
      # B2_S3_ENDPOINT=https://s3.REGION.backblazeb2.com  (S3-Compatible API no painel B2)
      # B2_KEY_ID=...  B2_APPLICATION_KEY=...  B2_BUCKET=...
      # B2_PUBLIC_BASE_URL=https://fXXX.backblazeb2.com/file/NOME_DO_BUCKET  OU  B2_DOWNLOAD_HOST=fXXX.backblazeb2.com (mesmo host da Friendly URL)

databases:
  - name: andy-models-db
    databaseName: andy_models
